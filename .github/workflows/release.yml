name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: focus

          - os: macos-13          # last x86_64 runner
            target: x86_64-apple-darwin
            binary: focus

          - os: macos-latest      # arm64 (M-series)
            target: aarch64-apple-darwin
            binary: focus

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: focus.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          BINARY="${{ matrix.binary }}"
          ARCHIVE="focus-${TAG}-${TARGET}"

          mkdir -p dist

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${TARGET}/release/${BINARY}" "dist/${ARCHIVE}.exe"
          else
            cp "target/${TARGET}/release/${BINARY}" "dist/${ARCHIVE}"
            chmod +x "dist/${ARCHIVE}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Prepare release notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "✅ Using AI-written RELEASE_NOTES.md from release branch"
          else
            echo "⚠️  RELEASE_NOTES.md not found, generating from git-cliff (fallback)"
            # Fallback: install git-cliff and generate notes from commits
            cargo install git-cliff --locked 2>/dev/null || true
            git cliff --latest --strip header --output RELEASE_NOTES.md
          fi
          echo "---"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: dist/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
